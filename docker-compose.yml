services:
  tuya-hub:
    # Pulls the image published to GHCR by .github/workflows/docker-publish.yml
    # on each `vX.Y.Z` tag push. Run `docker compose pull` to fetch a new
    # release. For local development you can still `docker build -t tuya-hub .`.
    image: ghcr.io/thomasgodon/tuya-hub:latest
    container_name: tuya-hub
    # Host networking: KNXnet/IP tunnelling (UDP 3671) needs the gateway's UDP
    # replies to reach the client, which Docker bridge NAT breaks. Tuya local
    # is outbound TCP 6668. Both target fixed LAN IPs; no ports are published.
    # The read-only status dashboard is reachable at http://<host>:8080/ over
    # this host network (set DashboardOptions__Port in .env to change it).
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      # Correct log timestamps; override in .env if desired.
      - TZ=Europe/Brussels
