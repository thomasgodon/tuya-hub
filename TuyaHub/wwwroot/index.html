<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>tuya-hub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0f14'/%3E%3Cg stroke='%2338bdf8' stroke-width='2.2' stroke-linecap='round' fill='none'%3E%3Cpath d='M16 12.8V6'/%3E%3Cpath d='M16 19.2V26'/%3E%3Cpath d='M12.8 16H6'/%3E%3Cpath d='M19.2 16H26'/%3E%3Ccircle cx='16' cy='6' r='1.9'/%3E%3Ccircle cx='16' cy='26' r='1.9'/%3E%3Ccircle cx='6' cy='16' r='1.9'/%3E%3Ccircle cx='26' cy='16' r='1.9'/%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='3' fill='%2338bdf8'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b0f14;
      --bg-elev: #131a23;
      --bg-card: #161d28;
      --border: #232c3a;
      --hair: rgba(255,255,255,.05);
      --text: #e6edf3;
      --text-dim: #8b97a7;
      --text-faint: #5b6573;
      --air: #38bdf8;      /* accent (device activity) */
      --warm: #fbbf24;     /* light */
      --ok: #3ecf8e;
      --off: #5b6573;
      --bad: #ef5350;
      --radius: 16px;
      --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background:
        radial-gradient(1100px 560px at 82% -12%, rgba(56,189,248,.08), transparent 60%),
        radial-gradient(820px 460px at -8% 112%, rgba(251,191,36,.06), transparent 55%),
        var(--bg);
      color: var(--text);
      font: 15px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: clamp(14px, 3vw, 32px);
    }

    .wrap { max-width: 1120px; margin: 0 auto; }

    /* ---- header ---- */
    header {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px 18px;
      margin-bottom: clamp(18px, 3vw, 28px);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-right: auto; }
    .brand .mark { width: 30px; height: 30px; flex: none; color: var(--air); }
    .brand h1 {
      font-size: clamp(21px, 3.5vw, 27px); font-weight: 700; letter-spacing: -.03em; margin: 0; line-height: 1;
    }
    .brand .sub { display: block; color: var(--text-faint); font-size: 12.5px; letter-spacing: .01em; margin-top: 3px; }

    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 11px; font-size: 12.5px; color: var(--text-dim);
    }
    .pill .label { color: var(--text); font-weight: 550; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--off); box-shadow: 0 0 0 3px rgba(255,255,255,.02); flex: none; }
    .dot.ok  { background: var(--ok);  box-shadow: 0 0 8px 0 rgba(62,207,142,.7); }
    .dot.bad { background: var(--bad); box-shadow: 0 0 8px 0 rgba(239,83,80,.7); }
    .dot.off { background: var(--off); }

    .live { display: inline-flex; align-items: center; gap: 7px; color: var(--text-dim); font-size: 12.5px; }
    .live .stamp { color: var(--text-faint); }

    .offline-banner {
      display: none; margin-bottom: 14px; padding: 9px 14px; border-radius: 10px;
      background: rgba(239,83,80,.12); border: 1px solid rgba(239,83,80,.4); color: #ffb3b1; font-size: 13px;
    }
    body.disconnected .offline-banner { display: block; }

    /* ---- cards ---- */
    .cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr)); }
    .empty { color: var(--text-faint); font-size: 14px; padding: 40px 4px; text-align: center; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px 18px; box-shadow: var(--shadow);
      transition: opacity .25s ease;
    }
    .card.is-offline { opacity: .5; }

    .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .card-head .title { display: flex; align-items: center; gap: 9px; font-weight: 650; font-size: 15.5px; letter-spacing: -.01em; margin-right: auto; }
    .card-head .off-tag { color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }

    /* signature: the fan glyph spins at the fan's speed */
    .fan { width: 40px; height: 40px; flex: none; color: var(--air); }
    .fan .rotor { transform-origin: 50% 50%; animation: spin var(--spin, 3s) linear infinite; }
    .fan.still { color: var(--text-faint); }
    .fan.still .rotor { animation: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .rotor { animation: none !important; } }

    .segs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 380px) { .segs { grid-template-columns: 1fr; } }
    .seg-title {
      font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 9px; display: flex; align-items: center; gap: 7px;
    }
    .seg-title .bar { width: 16px; height: 2px; border-radius: 2px; }
    .seg-fan .seg-title .bar { background: var(--air); }
    .seg-light .seg-title .bar { background: var(--warm); }

    .metric { display: flex; align-items: baseline; gap: 6px; }
    .metric .big { font-size: 30px; font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; line-height: 1; }
    .metric .big-label { color: var(--text-faint); font-size: 14px; font-weight: 550; }
    .metric .state { margin-left: auto; font-size: 12px; font-weight: 650; padding: 2px 9px; border-radius: 999px; align-self: center; }
    .state.on  { background: rgba(62,207,142,.14); color: var(--ok); }
    .state.off { background: rgba(139,151,167,.12); color: var(--text-dim); }

    .segments { display: flex; gap: 3px; margin: 11px 0 9px; }
    .segments i { height: 6px; flex: 1; border-radius: 2px; background: var(--hair); }
    .segments i.on { background: var(--air); }

    .bar { height: 6px; border-radius: 999px; background: var(--hair); margin: 11px 0 9px; overflow: hidden; }
    .bar i { display: block; height: 100%; border-radius: 999px; background: var(--warm); transition: width .3s ease; }

    .meta-row { display: flex; align-items: center; gap: 12px; color: var(--text-dim); font-size: 12.5px; min-height: 18px; }
    .meta-row .cct { display: inline-flex; align-items: center; gap: 6px; }
    .meta-row .swatch { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(255,255,255,.15); }
    .meta-row .timer { color: var(--air); font-variant-numeric: tabular-nums; }

    /* ---- discovered (unconfigured) devices ---- */
    .section-head { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 12px; }
    .section-head h2 { font-size: 15px; font-weight: 650; letter-spacing: -.01em; margin: 0; }
    .section-head .section-sub { color: var(--text-faint); font-size: 12.5px; }

    .card.discovered { border-style: dashed; border-color: rgba(251,191,36,.35); }
    .card.discovered .card-head { margin-bottom: 12px; }
    .card.discovered .title { font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, Consolas, monospace; font-size: 14px; }
    .card.discovered .dot { background: var(--warm); box-shadow: 0 0 8px 0 rgba(251,191,36,.55); }
    .disc-row { display: flex; align-items: baseline; gap: 8px; color: var(--text-dim); font-size: 13px; margin-top: 6px; }
    .disc-row .k { color: var(--text-faint); min-width: 58px; }
    .disc-row .v { color: var(--text); font-variant-numeric: tabular-nums; }
    .disc-tag { margin-top: 12px; display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .04em;
      color: var(--warm); background: rgba(251,191,36,.12); border-radius: 999px; padding: 3px 10px; }

    footer { margin-top: 22px; text-align: center; color: var(--text-faint); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <svg class="mark" viewBox="0 0 32 32" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="16" cy="16" r="3.2" fill="currentColor" stroke="none"/>
          <path d="M16 12.8 V5"/><path d="M16 19.2 V27"/>
          <path d="M12.8 16 H5"/><path d="M19.2 16 H27"/>
          <circle cx="16" cy="5" r="2"/><circle cx="16" cy="27" r="2"/>
          <circle cx="5" cy="16" r="2"/><circle cx="27" cy="16" r="2"/>
        </svg>
        <div>
          <h1>tuya-hub</h1>
          <span class="sub">Tuya · KNX bridge</span>
        </div>
      </div>
      <div class="pills">
        <span class="pill"><span class="dot" id="dot-knx"></span><span class="label">KNX</span> <span id="st-knx">—</span></span>
        <span class="pill"><span class="dot ok" id="dot-devices"></span><span class="label">Devices</span> <span id="st-devices">—</span></span>
      </div>
      <div class="live"><span class="dot" id="dot-live"></span><span class="stamp" id="stamp">connecting…</span></div>
    </header>

    <div class="offline-banner">Lost connection to tuya-hub — retrying…</div>

    <section class="cards" id="cards"></section>

    <div id="discovered-wrap" hidden>
      <div class="section-head">
        <h2>Discovered</h2>
        <span class="section-sub">on the LAN · not configured</span>
      </div>
      <section class="cards" id="discovered"></section>
    </div>

    <footer>tuya-hub live dashboard · updates on every device state change</footer>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    // Fan-blade SVG; spin rate is driven per card by the --spin CSS var (faster fan = shorter duration).
    const FAN_SVG = `<g class="rotor" fill="currentColor">
        <path d="M50 50 C40 34 40 16 50 8 C60 16 60 34 50 50 Z"/>
        <path d="M50 50 C40 34 40 16 50 8 C60 16 60 34 50 50 Z" transform="rotate(120 50 50)"/>
        <path d="M50 50 C40 34 40 16 50 8 C60 16 60 34 50 50 Z" transform="rotate(240 50 50)"/>
      </g><circle cx="50" cy="50" r="7" fill="var(--bg-card)" stroke="currentColor" stroke-width="3"/>`;

    const CCT = {
      0:    { label: "Cool white", color: "#dbeafe" },
      500:  { label: "Warm white", color: "#fde68a" },
      1000: { label: "Warm",       color: "#fb923c" }
    };

    const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    function setConn(dotId, stId, cls, text) {
      $(dotId).className = "dot " + cls;
      $(stId).textContent = text;
    }

    function fanCard(dev) {
      const f = dev.fan, l = dev.light;
      const spinning = f.power && f.speedStatus > 0;
      // level 1 -> 3s per turn, level 6 -> 0.5s per turn.
      const spin = spinning ? (3 / f.speedStatus).toFixed(2) + "s" : "0s";
      const fanClass = spinning ? "fan" : "fan still";

      const segments = Array.from({ length: 6 }, (_, i) =>
        `<i class="${f.power && i < f.speedStatus ? "on" : ""}"></i>`).join("");

      const direction = f.direction === "Reverse" ? "↥ Winter" : "↧ Summer";
      const timer = f.timerRunning ? `<span class="timer">⏲ ${f.timerMinutes} min</span>` : "";

      const cct = CCT[l.cctStep] || CCT[0];

      return `<article class="card ${dev.online ? "" : "is-offline"}">
        <header class="card-head">
          <div class="title"><span class="dot ${dev.online ? "ok" : "off"}"></span>${esc(dev.name)}</div>
          ${dev.online ? "" : '<span class="off-tag">offline</span>'}
          <svg class="${fanClass}" style="--spin:${spin}" viewBox="0 0 100 100" aria-hidden="true">${FAN_SVG}</svg>
        </header>
        <div class="segs">
          <section class="seg seg-fan">
            <div class="seg-title"><span class="bar"></span>Fan</div>
            <div class="metric">
              <span class="big">${f.power ? f.speedStatus : 0}</span><span class="big-label">/ 6</span>
              <span class="state ${f.power ? "on" : "off"}">${f.power ? "On" : "Off"}</span>
            </div>
            <div class="segments">${segments}</div>
            <div class="meta-row"><span>${direction}</span>${timer}</div>
          </section>
          <section class="seg seg-light">
            <div class="seg-title"><span class="bar"></span>Light</div>
            <div class="metric">
              <span class="big">${l.power ? l.brightnessPercent : 0}</span><span class="big-label">%</span>
              <span class="state ${l.power ? "on" : "off"}">${l.power ? "On" : "Off"}</span>
            </div>
            <div class="bar"><i style="width:${l.power ? l.brightnessPercent : 0}%"></i></div>
            <div class="meta-row"><span class="cct"><i class="swatch" style="background:${cct.color}"></i>${cct.label}</span></div>
          </section>
        </div>
      </article>`;
    }

    // Generic renderer for any device type without a bespoke card: a labelled list of its capabilities.
    function genericCard(dev) {
      const rows = (dev.sections || []).map(s =>
        `<div class="disc-row"><span class="k">${esc(s.label)}</span><span class="v">${esc(s.value)}</span></div>`).join("");
      return `<article class="card ${dev.online ? "" : "is-offline"}">
        <header class="card-head">
          <div class="title"><span class="dot ${dev.online ? "ok" : "off"}"></span>${esc(dev.name)}</div>
          ${dev.online ? "" : '<span class="off-tag">offline</span>'}
        </header>
        ${rows || '<div class="meta-row">No capabilities reported.</div>'}
      </article>`;
    }

    // Per-profile card renderers; profiles without a bespoke card fall back to genericCard.
    const RENDERERS = { "wind-calm": fanCard };

    function discoveredCard(dev) {
      const ver = dev.protocolVersion ? esc(dev.protocolVersion) : "?";
      const pk = dev.productKey
        ? `<div class="disc-row"><span class="k">Product</span><span class="v">${esc(dev.productKey)}</span></div>`
        : "";
      return `<article class="card discovered">
        <header class="card-head">
          <div class="title"><span class="dot"></span>${esc(dev.deviceId)}</div>
        </header>
        <div class="disc-row"><span class="k">IP</span><span class="v">${esc(dev.ipAddress || "?")}</span></div>
        <div class="disc-row"><span class="k">Protocol</span><span class="v">${ver}</span></div>
        ${pk}
        <span class="disc-tag">needs local key</span>
      </article>`;
    }

    function render(d) {
      // KNX pill
      if (!d.knx.enabled) setConn("dot-knx", "st-knx", "off", "disabled");
      else setConn("dot-knx", "st-knx", d.knx.connected ? "ok" : "bad", d.knx.connected ? "connected" : "disconnected");

      // devices online count
      const devices = d.devices || [];
      const online = devices.filter(x => x.online).length;
      $("st-devices").textContent = `${online} / ${devices.length} online`;
      $("dot-devices").className = "dot " + (devices.length === 0 ? "off" : online === devices.length ? "ok" : online === 0 ? "bad" : "");

      const cards = $("cards");
      cards.innerHTML = devices.length
        ? devices.map(d => (RENDERERS[d.profileId] || genericCard)(d)).join("")
        : '<div class="empty">No devices configured.</div>';

      // discovered-but-unconfigured devices (hidden entirely when none are seen)
      const discovered = d.discovered || [];
      $("discovered-wrap").hidden = discovered.length === 0;
      if (discovered.length) $("discovered").innerHTML = discovered.map(discoveredCard).join("");

      const t = new Date(d.timestamp);
      $("stamp").textContent = "updated " + t.toLocaleTimeString();
      $("dot-live").className = "dot ok";
      document.body.classList.remove("disconnected");
    }

    function connect() {
      const es = new EventSource("/events");
      es.onmessage = e => { try { render(JSON.parse(e.data)); } catch (err) { console.error(err); } };
      es.onopen = () => document.body.classList.remove("disconnected");
      es.onerror = () => {
        // EventSource auto-reconnects; reflect the gap in the UI meanwhile.
        $("dot-live").className = "dot bad";
        $("stamp").textContent = "reconnecting…";
        document.body.classList.add("disconnected");
      };
    }

    connect();
  </script>
</body>
</html>
